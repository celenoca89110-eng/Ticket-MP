<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Login Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a1d24, #0f1115);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #1a1d24;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    width: 350px;
    border: 1px solid #2b2f3a;
    box-shadow: 0 0 20px rgba(88,101,242,0.2);
}

h1 {
    color: #5865F2;
    margin-bottom: 10px;
}

p {
    opacity: 0.7;
    font-size: 14px;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 20px;
    background: #5865F2;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

.btn:hover {
    background: #4752c4;
}
</style>

</head>

<body>

<div class="box">

    <h1>🔐 SaaS Dashboard</h1>
    <p>Connecte-toi avec Discord pour accéder au panel</p>

    <a class="btn" href="/login">Login with Discord</a>

</div>

</body>
</html>
